services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres_db
    env_file:
      - ./backend/.env
    environment:
      # - POSTGRES_USER=${POSTGRES_USER}
      # - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - e-commerce_network

  adminer:
    image: adminer
    container_name: adminer
    ports:
      - "8080:8080"
    links:
      - "postgres:db"
    networks:
      - e-commerce_network
    depends_on:
      - postgres

  E-commerce-api-backend:
    build: ./backend
    image: e-commerce_api_image
    container_name: e-commerce_api_backend
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_HOST=postgres
    ports:
      - "8000:8000"
    networks:
      - e-commerce_network
    depends_on:
      - postgres

networks:
  e-commerce_network:
    driver: bridge

volumes:
  postgres-data:
  